name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Auto-version & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: "v"
          release_branches: main

      - name: Update version in package.json
        run: npm version ${{ steps.tag.outputs.new_version }} --no-git-tag-version

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          for attempt in 1 2 3; do
            npm publish --access public --provenance && break
            echo "Attempt $attempt failed — waiting 30s before retry..."
            sleep 30
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: "v${{ steps.tag.outputs.new_version }}"
          generate_release_notes: true
          body: ${{ steps.tag.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
